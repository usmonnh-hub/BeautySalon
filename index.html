<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" href="src/imges/Logo.svg">
    <link rel="stylesheet" href="src/output.css">
    <title>Beauty Salon</title>
  </head>
  <body class="m-0 box-border">
    <div class="border-b-1 border-[#E4E4E4]">
      <div class="bg-[#ffffff] w-[95%] m-auto flex justify-between items-center p-[20px] lg:max-w-[1200px] lg:m-auto lg:p-[30px] lg: lg:flex lg:items-center">
        <div>
          <img src="src/imges/Logo.svg" alt="">
        </div>
        <div class="text-[#69B99D] lg:hidden">
          <i class="fa-solid fa-bars"></i>
        </div>
        <div class="hidden lg:flex gap-[50px] h-[40px]">
          <p class="text-[17px] hover:border-b-3 border-#69b99d hover:text-[#69b99d] font-[450]">Início</p>
          <p class="text-[17px] hover:border-b-3 border-#69b99d hover:text-[#69b99d] font-[450]">Sobre</p>
          <p class="text-[17px] hover:border-b-3 border-#69b99d hover:text-[#69b99d] font-[450]">Serviços</p>
          <p class="text-[17px] hover:border-b-3 border-#69b99d hover:text-[#69b99d] font-[450]">Depoimentos</p>
          <p class="text-[17px] hover:border-b-3 border-#69b99d hover:text-[#69b99d] font-[450]">Contato</p>
        </div>
      </div>
    </div>
    <div class="bg-[#F9F9F9] pb-[60px]">
      <p class="bg-[#F9F9F9]">.</p>
      <div class="flex flex-col-reverse mt-[40px] lg:flex lg:flex-row  lg:max-w-[1200px] m-auto lg:justify-between">
        <div class="text-center lg:text-start  lg:mt-[70px]">
          <h1 class="text-[35px] font-[550] mb-[15px] lg:text-[45px]">Saúde natural para <br> os seus cabelos</h1>
          <p class="text-[15px] text-[grey] mb-[20px] lg:text-[20px]">Um salão exclusivo em São Paulo, <br> especializado em tratamentos naturais.</p>
          <button class="bg-[#69B99D] text-[#fff] px-[30px] py-[15px] rounded-[8px]">Agendar um  horário</button>
        </div>
        <div>
          <img src="src/imges/section1-img.png" alt="" class="mb-[30px] block m-auto">
        </div>
      </div>
    </div>
  </body>
</html>
